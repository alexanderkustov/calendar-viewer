name: Refresh Calendars

on:
  schedule:
    - cron: "17 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: refresh-calendars
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sync static calendar snapshots
        run: npm run sync:calendars

      - name: Commit updated snapshots
        run: |
          if git diff --quiet -- data; then
            echo "No calendar changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git commit -m "Update calendar snapshots"
          git push

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Stage static site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp style.css _site/
          cp main.js _site/
          cp robots.txt _site/
          cp .nojekyll _site/
          cp -R data _site/
          cp -R albufeira _site/
          cp -R portimao _site/
          cp -R mama _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
