<!DOCTYPE html>
<html lang="en" data-app-root="..">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stay Timeline</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="../style.css">
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="status-bar" id="statusBar">
      <div class="location-tabs" id="locationTabs" role="tablist" aria-label="Calendar location"></div>
      <div class="toggle-group" id="toggleGroup"></div>
      <button class="refresh-btn" id="refreshBtn" type="button" onclick="loadAll()">↺ Refresh</button>
    </div>
  </div>
</div>

<div class="main">
  <div id="loadingMsg" style="display:none; justify-content:center; align-items:center; font-size:1.2em; color:#2e6da4; margin-bottom:10px;">Loading calendars...</div>
  <div class="error-banner" id="errorBanner"></div>
  <div id="calendarContainer"></div>
  <div class="calendar-actions">
    <button class="load-more-btn" id="loadMoreBtn" type="button" onclick="loadMoreMonths()">Load more</button>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
window.__CALENDAR_VIEWER_LOCATION__ = 'albufeira';
</script>
<script src="../main.js"></script>
</body>
</html>
